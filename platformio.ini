; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
lib_dir = ./src/
src_dir = ./
default_envs = d1_mini

[env]
build_src_filter =
  +<**/*.c>
  +<**/*.cpp>
  +<**/*.ino>
  -<./3rdparty/*>
; Shared deps — tags match 3rdparty/ git submodules (see docs/LIBRARIES.md)
lib_deps =
    file://3rdparty/AsyncPersWiFiManager
    https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.11.2
    file://3rdparty/esp8266-oled-ssd1306
    https://github.com/dvarrel/ESPping.git#1.0.5
    ;links2004/WebSockets@^2.7.2

[env:d1_mini]
platform = espressif8266@2.6.3
board = d1_mini
framework = arduino
board_build.f_cpu = 160000000L
board_build.ldscript = eagle.flash.4m1m.ld
upload_speed = 921600
monitor_speed = 115200
lib_deps =
    ${env.lib_deps}
    https://github.com/ESP32Async/ESPAsyncTCP.git#v2.0.0
build_src_filter = ${env.build_src_filter}

; ESP32 bring-up target — firmware still needs porting work beyond library updates.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    ${env.lib_deps}
    https://github.com/ESP32Async/AsyncTCP.git#v3.5.0
build_src_filter = ${env.build_src_filter}
